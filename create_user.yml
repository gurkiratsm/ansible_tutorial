---
- name: Create Ansible user
  hosts: all
  become: yes

  tasks:
    - name: Create user
      tags: create_user
      user:
        name: ansible
        group: root
        shell: /bin/bash
        state: present
        #state: absent
        #remove: true

    - name: Add SSH key
      tags: create_user
      authorized_key:
        user: ansible
        key: "{{ lookup('file', '/$HOME/.ssh/id_rsa.pub') }}"
        # key: "ssh-rsa  gurkirat@ssh-server"

    - name: Add sudoers file for ansible user
      tags: create_user
      copy:
        # content: "ansible ALL=(ALL) NOPASSWD:ALL"
        src: ansible_sudoers
        dest: /etc/sudoers.d/ansible
        owner: root
        group: root
        mode: '0440'